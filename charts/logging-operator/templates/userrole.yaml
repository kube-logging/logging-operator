{{- if .Values.rbac.enabled }}
{{- if or .Values.rbac.createEditAggregatedClusterRole .Values.rbac.createAdminAggregatedClusterRole }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ template "logging-operator.fullname" . }}-edit
  labels:
    {{- if .Values.rbac.createEditAggregatedClusterRole }}
    rbac.authorization.k8s.io/aggregate-to-edit: "true"
    {{- end }}
    {{- if .Values.rbac.createAdminAggregatedClusterRole }}
    rbac.authorization.k8s.io/aggregate-to-admin: "true"
    {{- end }}
{{ include "logging-operator.labels" . | indent 4 }}
rules:
- apiGroups:
  - logging.banzaicloud.io
  resources:
  - flows
  - outputs
  verbs:
  - create
  - delete
  - deletecollection
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - logging.banzaicloud.io
  resources:
  - syslogngflows
  - syslogngoutputs
  verbs:
  - create
  - delete
  - deletecollection
  - get
  - list
  - patch
  - update
  - watch
{{- end }}
{{- if .Values.rbac.createViewAggregatedClusterRole }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ template "logging-operator.fullname" . }}-view
  labels:
    rbac.authorization.k8s.io/aggregate-to-view: "true"
{{ include "logging-operator.labels" . | indent 4 }}
rules:
- apiGroups:
  - logging.banzaicloud.io
  resources:
  - flows
  - outputs
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - logging.banzaicloud.io
  resources:
  - syslogngflows
  - syslogngoutputs
  verbs:
  - get
  - list
  - watch
{{- end }}
{{- end }}
