version: "2"
run:
  timeout: 10m
  allow-parallel-runners: true

formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/kube-logging/logging-operator)
    goimports:
      local-prefixes:
        - github.com/kube-logging/logging-operator
    gofmt:
      simplify: true
    gofumpt:
      extra-rules: false

linters:
  settings:
    misspell:
      locale: US
    revive:
      confidence: 0.9
    gocyclo:
      min-complexity: 40
  enable:
    - bodyclose
    - errcheck
    - ineffassign
    - misspell
    - nolintlint
    - revive
    - gocyclo
    - unconvert
    - unparam
    - unused
    - whitespace
  exclusions:
    rules:
      # The `inline` analyzer (new in golangci-lint v2.12 via go fix tool) emits
      # false positives on stdlib generic functions (slices.Sort, maps.Clone, etc.)
      # because type parameter inference is not yet supported by the inliner.
      - text: "cannot inline: type parameter inference is not yet supported"
        linters:
          - govet
